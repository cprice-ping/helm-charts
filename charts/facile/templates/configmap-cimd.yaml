{{- if .Values.useCases.cimd.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app.kubernetes.io/name: {{ include "facile.name" . }}
    helm.sh/chart: {{ include "facile.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  name: {{ .Release.Name }}-cimd-ingress
spec:
  ingressClassName: nginx-public
  tls:
  - hosts:
      - {{ include "facile.hostname" . }}
  rules:
  - host: {{ include "facile.hostname" . }}
    http:
      paths:
      - path: /cimd.json
        pathType: Exact
        backend:
          service:
            name: {{ .Release.Name }}-facile-apps
            port:
              number: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: {{ include "facile.name" . }}
    helm.sh/chart: {{ include "facile.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  name: {{ .Release.Name }}-cimd
data:
  client-metadata.json: |
    {
        "client_id": "http://{{ .Release.Name }}-facile-apps:3000/cimd.json",
        "client_name": {{ .Values.useCases.cimd.clientName | quote }},
        "redirect_uris": [
            "https://{{ include "facile.hostname" . }}/callback",
            "https://oauth.pstmn.io/v1/callback"
        ],
        "response_types": ["code"],
        "grant_types": ["authorization_code", "refresh_token"],
        "token_endpoint_auth_method": {{ .Values.useCases.cimd.tokenEndpointAuthMethod | quote }},
        "scope": {{ .Values.useCases.cimd.scope | quote }},
        "application_type": "web",
        "subject_type": "public"
    }
{{- end -}}
