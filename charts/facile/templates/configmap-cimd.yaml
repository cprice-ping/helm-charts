{{- if .Values.useCases.agentic.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: {{ include "facile.name" . }}
    helm.sh/chart: {{ include "facile.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  name: {{ .Release.Name }}-cimd
data:
  client-metadata.json: |
    {
        "client_id": "https://{{ include "facile.hostname" . }}/cimd.json",
        "client_name": {{ .Values.useCases.agentic.clientName | quote }},
        "redirect_uris": [
            "https://{{ include "facile.hostname" . }}/callback"
        ],
        "response_types": ["code"],
        "grant_types": ["authorization_code", "refresh_token"],
        "token_endpoint_auth_method": {{ .Values.useCases.agentic.tokenEndpointAuthMethod | quote }},
        "scope": {{ .Values.useCases.agentic.scope | quote }},
        "application_type": "web",
        "subject_type": "public"
    }
{{- end -}}
